<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joint Operations Feedback Viewer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #e7eaee;
      --bg-2: #dfe3e8;
      --panel: #f7f8fa;
      --panel-2: #eef1f4;
      --panel-3: #e5e9ee;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #cfd6de;
      --accent: #8c98a8;
      --accent-2: #6f7a88;
      --danger: #cf6a6a;
      --warn: #c8a75f;
      --ok: #6ea27a;
      --button: #7f8b99;
      --button-hover: #6d7886;
      --shadow: 0 8px 22px rgba(50, 60, 75, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: "Open Sans", Arial, Helvetica, sans-serif;
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
    }

    .container {
      max-width: 1550px;
      margin: auto;
    }

    .card {
      background: linear-gradient(180deg, rgba(247,248,250,0.98) 0%, rgba(238,241,244,0.98) 100%);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    h1, h2 {
      margin-top: 0;
      font-family: "Oswald", Arial, sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #2a3441;
    }

    h1 {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .muted {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      align-items: center;
    }

    select,
    button {
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: "Open Sans", Arial, sans-serif;
    }

    select {
      background: #ffffff;
      color: var(--text);
      min-width: 220px;
    }

    button {
      background: linear-gradient(180deg, var(--button) 0%, var(--button-hover) 100%);
      color: white;
      cursor: pointer;
      min-width: 120px;
      border: none;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.75;
      cursor: wait;
      transform: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat-box {
      background: linear-gradient(180deg, #ffffff 0%, var(--panel-2) 100%);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid var(--border);
    }

    .stat-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .stat-value {
      font-size: 26px;
      font-weight: bold;
      font-family: "Oswald", Arial, sans-serif;
      color: #2a3441;
    }

    .gauge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .gauge-card {
      background: linear-gradient(180deg, #ffffff 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 270px;
      display: flex;
      flex-direction: column;
    }

    .gauge-title {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.35;
      min-height: 42px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .gauge-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }

    .gauge-svg {
      width: 100%;
      max-width: 260px;
      height: 190px;
      display: block;
      overflow: visible;
    }

    .gauge-bg {
      fill: none;
      stroke: #d8dee6;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .gauge-value {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .gauge-needle {
      stroke: #2f3946;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gauge-center {
      fill: #2f3946;
    }

    .gauge-score {
      font-size: 24px;
      font-weight: bold;
      fill: #2f3946;
      text-anchor: middle;
      font-family: "Oswald", Arial, sans-serif;
    }

    .gauge-sub {
      font-size: 12px;
      fill: #6b7280;
      text-anchor: middle;
    }

    .gauge-scale {
      font-size: 12px;
      fill: var(--muted);
      text-anchor: middle;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
      background: #ffffff;
    }

    th {
      background: #e9edf2;
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      font-family: "Oswald", Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #2a3441;
      text-transform: uppercase;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }

    tr:hover {
      background: rgba(127, 139, 153, 0.06);
    }

    .empty {
      color: var(--muted);
      padding: 12px 0 0;
    }

    .rating-cell {
      min-width: 160px;
    }

    .rating-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rating-bar {
      position: relative;
      width: 110px;
      height: 10px;
      border-radius: 999px;
      background: #dbe2ea;
      overflow: hidden;
      border: 1px solid #cbd4de;
      flex-shrink: 0;
    }

    .rating-fill {
      height: 100%;
      border-radius: 999px;
    }

    .rating-value {
      font-weight: 700;
      color: #394554;
      min-width: 38px;
      text-align: right;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      body {
        padding: 18px;
      }

      .gauge-card {
        min-height: 250px;
      }

      .gauge-svg {
        height: 180px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      select,
      button {
        width: 100%;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>Joint Operations Feedback</h1>
      <p class="muted">Live results from the Google Form</p>

      <div class="toolbar">
        <select id="missionFilter">
          <option value="">All Missions</option>
        </select>

        <select id="unitFilter">
          <option value="">All Units</option>
        </select>

        <button id="refreshButton" type="button">Refresh</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-title">Total responses</div>
          <div class="stat-value" id="totalResponses">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-title">Visible responses</div>
          <div class="stat-value" id="visibleResponses">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-title">Selected mission</div>
          <div class="stat-value" id="selectedMission" style="font-size:18px;">All Missions</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Average Scores</h2>
      <p class="muted">These gauges show the average score of the currently selected unit and mission.</p>
      <div id="gauges" class="gauge-grid"></div>
      <div id="gaugeEmpty" class="empty" style="display:none;">
        No numeric data found for the selected responses.
      </div>
    </div>

    <div class="card">
      <h2>Responses</h2>
      <div class="table-wrap">
        <table id="table">
          <thead>
            <tr id="header"></tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQf8L3Zc_XWlfcoyTnJfFlaiGPjcNyUDXODP12qHF1yQk3_DZJVBCJbWXNRzsgw53TRCn1BCo_VBm4U/pub?output=csv";

    const unitColumnName = "Your Unit?";
    const timestampColumnName = "Timestamp";
    const gaugeMin = 1;
    const gaugeMax = 10;

    let rows = [];
    let headers = [];
    let enrichedRows = [];

    const gaugeDefinitions = [
      {
        key: "mission_satisfaction",
        label: "Mission Satisfaction",
        matchers: [
          "how satisfied were you with the mission",
          "satisfied were you with the mission"
        ]
      },
      {
        key: "performance",
        label: "Performance",
        matchers: [
          "how was your performance throughout the mission",
          "performance throughout the mission"
        ]
      },
      {
        key: "difficulty",
        label: "Mission Difficulty",
        matchers: [
          "how would you rate the mission's difficulty level",
          "how would you rate the missions difficulty level",
          "mission difficulty level"
        ]
      },
      {
        key: "command_and_control",
        label: "Command and Control Satisfaction",
        matchers: [
          "how satisfied are you with command and control in the mission",
          "how satisfied are you with command and control in mission",
          "satisfied are you with command and control in the mission",
          "command and control in the mission",
          "command and control in mission",
          "how satisfied are you with c2 in the mission",
          "satisfied are you with c2 in the mission",
          "c2 in the mission"
        ]
      }
    ];

    function parseCSV(text) {
      const result = [];
      let row = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(current);
          result.push(row);
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current);
        result.push(row);
      }

      return result.filter(r => r.some(cell => String(cell).trim() !== ""));
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9? ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getUnitColumnIndex() {
      return headers.findIndex(h => normalizeText(h) === normalizeText(unitColumnName));
    }

    function getTimestampColumnIndex() {
      return headers.findIndex(h => normalizeText(h) === normalizeText(timestampColumnName));
    }

    function getVisibleColumnIndexes() {
      const timestampIndex = getTimestampColumnIndex();
      return headers
        .map((_, index) => index)
        .filter(index => index !== timestampIndex);
    }

    function findQuestionColumnIndex(matchers) {
      return headers.findIndex(header => {
        const normalizedHeader = normalizeText(header);
        return matchers.some(m => normalizedHeader.includes(normalizeText(m)));
      });
    }

    function getGaugeColumnIndexes() {
      const indexes = new Set();
      for (const gauge of gaugeDefinitions) {
        const index = findQuestionColumnIndex(gauge.matchers);
        if (index !== -1) indexes.add(index);
      }
      return indexes;
    }

    function getGaugeKeyForColumnIndex(columnIndex) {
      for (const gauge of gaugeDefinitions) {
        const index = findQuestionColumnIndex(gauge.matchers);
        if (index === columnIndex) return gauge.key;
      }
      return null;
    }

    function parseNumericValue(value) {
      if (value === null || value === undefined) return null;
      const cleaned = String(value).trim().replace(",", ".");
      if (cleaned === "") return null;
      const num = Number(cleaned);
      if (Number.isNaN(num)) return null;
      return num;
    }

    function parseResponseDate(value) {
      if (!value) return null;

      const raw = String(value).trim();
      if (!raw) return null;

      const dotMatch = raw.match(
        /^(\d{1,2})\.(\d{1,2})\.(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/
      );
      if (dotMatch) {
        const [, dd, mm, yyyy, hh = "0", mi = "0", ss = "0"] = dotMatch;
        const year = yyyy.length === 2 ? Number(`20${yyyy}`) : Number(yyyy);
        return new Date(year, Number(mm) - 1, Number(dd), Number(hh), Number(mi), Number(ss));
      }

      const slashMatch = raw.match(
        /^(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/
      );
      if (slashMatch) {
        const [, a, b, yyyy, hh = "0", mi = "0", ss = "0"] = slashMatch;
        const year = yyyy.length === 2 ? Number(`20${yyyy}`) : Number(yyyy);

        let month;
        let day;

        if (Number(a) > 12) {
          day = Number(a);
          month = Number(b) - 1;
        } else {
          month = Number(a) - 1;
          day = Number(b);
        }

        return new Date(year, month, day, Number(hh), Number(mi), Number(ss));
      }

      const nativeParsed = new Date(raw);
      if (!Number.isNaN(nativeParsed.getTime())) {
        return nativeParsed;
      }

      return null;
    }

    function lastSaturdayOfMonth(year, monthIndex) {
      const lastDay = new Date(year, monthIndex + 1, 0);
      const dayOfWeek = lastDay.getDay();
      const diffToSaturday = (dayOfWeek - 6 + 7) % 7;
      return new Date(year, monthIndex, lastDay.getDate() - diffToSaturday);
    }

    function addMonths(year, monthIndex, amount) {
      const d = new Date(year, monthIndex + amount, 1);
      return { year: d.getFullYear(), monthIndex: d.getMonth() };
    }

    function missionLabelForMonth(year, monthIndex) {
      return new Date(year, monthIndex, 1).toLocaleString("en-US", {
        month: "short",
        year: "numeric"
      });
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0, 0);
    }

    function getMissionForDate(date) {
      if (!date) return null;

      const dayOnly = startOfDay(date);
      const baseYear = dayOnly.getFullYear();
      const baseMonth = dayOnly.getMonth();

      let bestCandidate = null;

      for (let offset = -3; offset <= 1; offset++) {
        const current = addMonths(baseYear, baseMonth, offset);
        const lastSat = startOfDay(lastSaturdayOfMonth(current.year, current.monthIndex));

        if (lastSat <= dayOnly) {
          if (!bestCandidate || lastSat > bestCandidate.start) {
            bestCandidate = {
              key: `${current.year}-${String(current.monthIndex + 1).padStart(2, "0")}`,
              label: missionLabelForMonth(current.year, current.monthIndex),
              start: lastSat
            };
          }
        }
      }

      if (bestCandidate) {
        return bestCandidate;
      }

      const fallback = addMonths(baseYear, baseMonth, -1);
      return {
        key: `${fallback.year}-${String(fallback.monthIndex + 1).padStart(2, "0")}`,
        label: missionLabelForMonth(fallback.year, fallback.monthIndex),
        start: startOfDay(lastSaturdayOfMonth(fallback.year, fallback.monthIndex))
      };
    }

    function buildEnrichedRows() {
      const timestampIndex = getTimestampColumnIndex();

      enrichedRows = rows.slice(1).map((row) => {
        const timestampValue = timestampIndex >= 0 ? row[timestampIndex] : "";
        const parsedDate = parseResponseDate(timestampValue);
        const mission = getMissionForDate(parsedDate);

        return {
          row,
          date: parsedDate,
          missionKey: mission ? mission.key : "",
          missionLabel: mission ? mission.label : "Unknown",
          missionStart: mission ? mission.start : null
        };
      });
    }

    function populateMissionFilter() {
      const select = document.getElementById("missionFilter");
      const currentValue = select.value;

      const uniqueMissions = [];
      const seen = new Set();

      enrichedRows
        .filter(item => item.missionKey)
        .sort((a, b) => {
          const aTime = a.missionStart ? a.missionStart.getTime() : 0;
          const bTime = b.missionStart ? b.missionStart.getTime() : 0;
          return bTime - aTime;
        })
        .forEach(item => {
          if (!seen.has(item.missionKey)) {
            seen.add(item.missionKey);
            uniqueMissions.push({
              key: item.missionKey,
              label: item.missionLabel
            });
          }
        });

      select.innerHTML = '<option value="">All Missions</option>';

      for (const mission of uniqueMissions) {
        const option = document.createElement("option");
        option.value = mission.key;
        option.textContent = mission.label;
        select.appendChild(option);
      }

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function getMissionFilteredRows() {
      const selectedMission = document.getElementById("missionFilter").value;
      return enrichedRows.filter(item => !selectedMission || item.missionKey === selectedMission);
    }

    function populateUnitFilter() {
      const select = document.getElementById("unitFilter");
      const currentValue = select.value;
      const unitIndex = getUnitColumnIndex();
      const missionFiltered = getMissionFilteredRows();

      select.innerHTML = '<option value="">All Units</option>';

      if (unitIndex === -1) return;

      const units = [...new Set(
        missionFiltered
          .map(item => (item.row[unitIndex] || "").trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      for (const unit of units) {
        const option = document.createElement("option");
        option.value = unit;
        option.textContent = unit;
        select.appendChild(option);
      }

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function getFilteredRows() {
      const selectedMission = document.getElementById("missionFilter").value;
      const selectedUnit = document.getElementById("unitFilter").value;
      const unitIndex = getUnitColumnIndex();

      return enrichedRows.filter(item => {
        const matchesMission = !selectedMission || item.missionKey === selectedMission;
        const matchesUnit =
          !selectedUnit ||
          unitIndex === -1 ||
          ((item.row[unitIndex] || "").trim() === selectedUnit);

        return matchesMission && matchesUnit;
      });
    }

    function getBarColor(value, mode = "default") {
      if (mode === "centered") {
        const midpoint = (gaugeMin + gaugeMax) / 2;
        const maxDistance = (gaugeMax - gaugeMin) / 2;
        const normalizedDistance = Math.abs(value - midpoint) / maxDistance;

        if (normalizedDistance < 0.2) return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
        if (normalizedDistance < 0.45) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
        return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      }

      const normalized = (value - gaugeMin) / (gaugeMax - gaugeMin);
      if (normalized < 0.4) return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      if (normalized < 0.7) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
    }

    function createRatingBar(value, mode = "default") {
      const safeValue = clamp(value, gaugeMin, gaugeMax);
      const percent = ((safeValue - gaugeMin) / (gaugeMax - gaugeMin)) * 100;
      const color = getBarColor(safeValue, mode);

      const wrapper = document.createElement("div");
      wrapper.className = "rating-wrap";
      wrapper.innerHTML = `
        <div class="rating-bar">
          <div class="rating-fill" style="width:${percent}%; background:${color};"></div>
        </div>
        <div class="rating-value">${safeValue.toFixed(1).replace(".0", "")}/10</div>
      `;
      return wrapper;
    }

    function renderTable(filteredItems) {
      const header = document.getElementById("header");
      const body = document.getElementById("body");
      const visibleIndexes = getVisibleColumnIndexes();
      const gaugeIndexes = getGaugeColumnIndexes();

      header.innerHTML = "";
      body.innerHTML = "";

      for (const index of visibleIndexes) {
        const th = document.createElement("th");
        th.textContent = headers[index];
        header.appendChild(th);
      }

      for (const item of filteredItems) {
        const tr = document.createElement("tr");

        for (const index of visibleIndexes) {
          const td = document.createElement("td");
          const numericValue = parseNumericValue(item.row[index]);
          const gaugeKey = getGaugeKeyForColumnIndex(index);

          if (gaugeIndexes.has(index) && numericValue !== null) {
            td.className = "rating-cell";
            td.appendChild(createRatingBar(
              numericValue,
              gaugeKey === "difficulty" ? "centered" : "default"
            ));
          } else {
            td.textContent = item.row[index] ?? "";
          }

          tr.appendChild(td);
        }

        body.appendChild(tr);
      }

      document.getElementById("totalResponses").textContent = enrichedRows.length;
      document.getElementById("visibleResponses").textContent = filteredItems.length;

      const selectedMissionValue = document.getElementById("missionFilter").value;
      const selectedMissionText =
        selectedMissionValue
          ? document.querySelector(`#missionFilter option[value="${selectedMissionValue}"]`)?.textContent || "Unknown"
          : "All Missions";

      document.getElementById("selectedMission").textContent = selectedMissionText;
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const angleRad = angleDeg * Math.PI / 180;
      return {
        x: cx + (r * Math.cos(angleRad)),
        y: cy + (r * Math.sin(angleRad))
      };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, startAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
    }

    function getGaugeColor(avg, min = gaugeMin, max = gaugeMax, mode = "default") {
      if (mode === "centered") {
        const midpoint = (min + max) / 2;
        const maxDistance = (max - min) / 2;
        const normalizedDistance = Math.abs(avg - midpoint) / maxDistance;

        if (normalizedDistance < 0.2) return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
        if (normalizedDistance < 0.45) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
        return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      }

      const normalized = (avg - min) / (max - min);
      if (normalized < 0.4) return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      if (normalized < 0.7) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
    }

    function buildGauge(title, avg, count, mode = "default") {
      const min = gaugeMin;
      const max = gaugeMax;
      const safeAvg = clamp(avg, min, max);
      const color = getGaugeColor(safeAvg, min, max, mode);

      const cx = 100;
      const cy = 115;
      const r = 55;

      const bgArc = describeArc(cx, cy, r, 180, 360);
      const valueEndAngle = 180 + (((safeAvg - min) / (max - min)) * 180);
      const valueArc = describeArc(cx, cy, r, 180, valueEndAngle);

      const needleLength = 40;
      const needle = polarToCartesian(cx, cy, needleLength, valueEndAngle);

      const leftScale = polarToCartesian(cx, cy, r + 16, 180);
      const rightScale = polarToCartesian(cx, cy, r + 16, 360);

      const card = document.createElement("div");
      card.className = "gauge-card";
      card.innerHTML = `
        <div class="gauge-title">${title}</div>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 200 190" aria-label="${title} average gauge">
            <path class="gauge-bg" d="${bgArc}"></path>
            <path class="gauge-value" d="${valueArc}" style="stroke:${color};"></path>

            <line class="gauge-needle" x1="${cx}" y1="${cy}" x2="${needle.x}" y2="${needle.y}"></line>
            <circle class="gauge-center" cx="${cx}" cy="${cy}" r="4.5"></circle>

            <text class="gauge-score" x="${cx}" y="160">${safeAvg.toFixed(2)}</text>
            <text class="gauge-sub" x="${cx}" y="178">based on ${count} answer(s)</text>

            <text class="gauge-scale" x="${leftScale.x}" y="${leftScale.y + 5}">${min}</text>
            <text class="gauge-scale" x="${rightScale.x}" y="${rightScale.y + 5}">${max}</text>
          </svg>
        </div>
      `;
      return card;
    }

    function renderGauges(filteredItems) {
      const gaugesEl = document.getElementById("gauges");
      const emptyEl = document.getElementById("gaugeEmpty");

      gaugesEl.innerHTML = "";

      const results = [];

      for (const gauge of gaugeDefinitions) {
        const columnIndex = findQuestionColumnIndex(gauge.matchers);
        if (columnIndex === -1) continue;

        const numericValues = filteredItems
          .map(item => parseNumericValue(item.row[columnIndex]))
          .filter(v => v !== null)
          .map(v => clamp(v, gaugeMin, gaugeMax));

        if (!numericValues.length) continue;

        const sum = numericValues.reduce((a, b) => a + b, 0);
        const avg = sum / numericValues.length;

        results.push({
          title: gauge.label,
          avg: clamp(avg, gaugeMin, gaugeMax),
          count: numericValues.length,
          mode: gauge.key === "difficulty" ? "centered" : "default"
        });
      }

      if (!results.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      for (const item of results) {
        gaugesEl.appendChild(buildGauge(item.title, item.avg, item.count, item.mode));
      }
    }

    function applyFilters() {
      const filteredItems = getFilteredRows();
      renderTable(filteredItems);
      renderGauges(filteredItems);
    }

    function handleMissionChange() {
      populateUnitFilter();
      applyFilters();
    }

    async function loadSheet() {
      const refreshButton = document.getElementById("refreshButton");
      refreshButton.disabled = true;
      refreshButton.textContent = "Refreshing...";

      try {
        const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
        const text = await res.text();

        rows = parseCSV(text);
        headers = rows[0] || [];

        buildEnrichedRows();
        populateMissionFilter();
        populateUnitFilter();
        applyFilters();
      } catch (error) {
        console.error("Failed to load sheet data:", error);
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = "Refresh";
      }
    }

    document.getElementById("missionFilter").addEventListener("change", handleMissionChange);
    document.getElementById("unitFilter").addEventListener("change", applyFilters);
    document.getElementById("refreshButton").addEventListener("click", loadSheet);

    loadSheet();
  </script>
</body>
</html>
