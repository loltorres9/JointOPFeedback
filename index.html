<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joint Operations Feedback Viewer</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:40px;
}

h1{
margin-top:0;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#334155;
text-align:left;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #475569;
}

tr:hover{
background:#334155;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Joint Operations Feedback</h1>
<p>Live results from the Google Form</p>

<input type="text" id="search" placeholder="Search..." />

</div>

<div class="card">

<table id="table">

<thead>
<tr id="header"></tr>
</thead>

<tbody id="body"></tbody>

</table>

</div>

</div>

<script>

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQf8L3Zc_XWlfcoyTnJfFlaiGPjcNyUDXODP12qHF1yQk3_DZJVBCJbWXNRzsgw53TRCn1BCo_VBm4U/pub?output=csv";

let rows = [];

function parseCSV(text){

let lines = text.split("\n");
let result = [];

for(let line of lines){

let row = [];
let current = "";
let insideQuotes = false;

for(let char of line){

if(char === '"'){
insideQuotes = !insideQuotes;
}

else if(char === "," && !insideQuotes){
row.push(current);
current = "";
}

else{
current += char;
}

}

row.push(current);

result.push(row);

}

return result;

}

function renderTable(data){

const header = document.getElementById("header");
const body = document.getElementById("body");

header.innerHTML = "";
body.innerHTML = "";

let headers = data[0];

for(let h of headers){
let th = document.createElement("th");
th.textContent = h;
header.appendChild(th);
}

for(let i=1;i<data.length;i++){

let tr = document.createElement("tr");

for(let cell of data[i]){

let td = document.createElement("td");
td.textContent = cell;
tr.appendChild(td);

}

body.appendChild(tr);

}

}

function filterTable(){

let search = document
.getElementById("search")
.value
.toLowerCase();

let filtered = [rows[0]];

for(let i=1;i<rows.length;i++){

let row = rows[i];

if(row.join(" ").toLowerCase().includes(search)){
filtered.push(row);
}

}

renderTable(filtered);

}

async function loadSheet(){

let res = await fetch(SHEET_CSV_URL);

let text = await res.text();

rows = parseCSV(text);

renderTable(rows);

}

document
.getElementById("search")
.addEventListener("input",filterTable);

loadSheet();

</script>

</body>
</html>
