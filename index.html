<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joint Operations Feedback Viewer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #475569;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1500px;
      margin: auto;
    }

    .card {
      background: var(--panel);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .muted {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      min-width: 240px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat-box {
      background: var(--panel-2);
      border-radius: 10px;
      padding: 14px;
      border: 1px solid var(--border);
    }

    .stat-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: bold;
    }

    .gauge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .gauge-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 250px;
    }

    .gauge-title {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.35;
      min-height: 40px;
      margin-bottom: 10px;
    }

    .gauge-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gauge-svg {
      width: 100%;
      max-width: 260px;
      height: 170px;
      overflow: visible;
    }

    .gauge-bg {
      fill: none;
      stroke: #1b2438;
      stroke-width: 16;
      stroke-linecap: round;
    }

    .gauge-value {
      fill: none;
      stroke-width: 16;
      stroke-linecap: round;
    }

    .gauge-needle {
      stroke: #ffffff;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gauge-center {
      fill: #ffffff;
    }

    .gauge-score {
      font-size: 24px;
      font-weight: bold;
      fill: #ffffff;
      text-anchor: middle;
    }

    .gauge-sub {
      font-size: 12px;
      fill: #cbd5e1;
      text-anchor: middle;
    }

    .gauge-scale {
      font-size: 12px;
      fill: var(--muted);
      text-anchor: middle;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: var(--panel-2);
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .empty {
      color: var(--muted);
      padding: 12px 0 0;
    }

    @media (max-width: 700px) {
      body {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>Joint Operations Feedback</h1>
      <p class="muted">Live results from the Google Form</p>

      <div class="toolbar">
        <select id="unitFilter">
          <option value="">All Units</option>
        </select>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-title">Total responses</div>
          <div class="stat-value" id="totalResponses">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-title">Visible responses</div>
          <div class="stat-value" id="visibleResponses">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Average Scores</h2>
      <p class="muted">These gauges show the average score of the currently selected unit.</p>
      <div id="gauges" class="gauge-grid"></div>
      <div id="gaugeEmpty" class="empty" style="display:none;">
        No numeric data found for the selected responses.
      </div>
    </div>

    <div class="card">
      <h2>Responses</h2>
      <div class="table-wrap">
        <table id="table">
          <thead>
            <tr id="header"></tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQf8L3Zc_XWlfcoyTnJfFlaiGPjcNyUDXODP12qHF1yQk3_DZJVBCJbWXNRzsgw53TRCn1BCo_VBm4U/pub?output=csv";

    const unitColumnName = "Your Unit?";

    let rows = [];
    let headers = [];

    const gaugeDefinitions = [
      {
        label: "Mission Satisfaction",
        matchers: [
          "how satisfied were you with the mission",
          "satisfied were you with the mission"
        ]
      },
      {
        label: "Performance",
        matchers: [
          "how was your performance throughout the mission",
          "performance throughout the mission"
        ]
      },
      {
        label: "Mission Difficulty",
        matchers: [
          "how would you rate the mission's difficulty level",
          "how would you rate the missions difficulty level",
          "mission difficulty level"
        ]
      },
      {
        label: "C2 Satisfaction",
        matchers: [
          "how satisfied are you with c2 in the mission",
          "satisfied are you with c2 in the mission",
          "c2 in the mission"
        ]
      }
    ];

    function parseCSV(text) {
      const result = [];
      let row = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(current);
          result.push(row);
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current);
        result.push(row);
      }

      return result.filter(r => r.some(cell => String(cell).trim() !== ""));
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9? ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getUnitColumnIndex() {
      return headers.findIndex(h => normalizeText(h) === normalizeText(unitColumnName));
    }

    function findQuestionColumnIndex(matchers) {
      return headers.findIndex(header => {
        const normalizedHeader = normalizeText(header);
        return matchers.some(m => normalizedHeader.includes(normalizeText(m)));
      });
    }

    function populateUnitFilter() {
      const select = document.getElementById("unitFilter");
      const unitIndex = getUnitColumnIndex();

      select.innerHTML = '<option value="">All Units</option>';

      if (unitIndex === -1) return;

      const units = [...new Set(
        rows.slice(1)
          .map(r => (r[unitIndex] || "").trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      for (const unit of units) {
        const option = document.createElement("option");
        option.value = unit;
        option.textContent = unit;
        select.appendChild(option);
      }
    }

    function parseNumericValue(value) {
      if (value === null || value === undefined) return null;

      const cleaned = String(value).trim().replace(",", ".");
      if (cleaned === "") return null;

      const num = Number(cleaned);
      if (Number.isNaN(num)) return null;

      return num;
    }

    function getFilteredRows() {
      const selectedUnit = document.getElementById("unitFilter").value;
      const unitIndex = getUnitColumnIndex();

      return rows.slice(1).filter(row => {
        return (
          !selectedUnit ||
          unitIndex === -1 ||
          ((row[unitIndex] || "").trim() === selectedUnit)
        );
      });
    }

    function renderTable(filteredRows) {
      const header = document.getElementById("header");
      const body = document.getElementById("body");

      header.innerHTML = "";
      body.innerHTML = "";

      for (const h of headers) {
        const th = document.createElement("th");
        th.textContent = h;
        header.appendChild(th);
      }

      for (const row of filteredRows) {
        const tr = document.createElement("tr");

        for (let i = 0; i < headers.length; i++) {
          const td = document.createElement("td");
          td.textContent = row[i] ?? "";
          tr.appendChild(td);
        }

        body.appendChild(tr);
      }

      document.getElementById("totalResponses").textContent = Math.max(rows.length - 1, 0);
      document.getElementById("visibleResponses").textContent = filteredRows.length;
    }

    function getGaugeColor(avg, min = 1, max = 5) {
      const normalized = (avg - min) / (max - min);

      if (normalized < 0.4) return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      if (normalized < 0.7) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const angleRad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + (r * Math.cos(angleRad)),
        y: cy + (r * Math.sin(angleRad))
      };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y}`;
    }

    function getNeedlePoint(cx, cy, length, avg, min = 1, max = 5) {
      const safeAvg = clamp(avg, min, max);
      const ratio = (safeAvg - min) / (max - min);
      const angle = 180 + (ratio * 180);
      return polarToCartesian(cx, cy, length, angle);
    }

    function buildGauge(title, avg, count) {
      const min = 1;
      const max = 5;
      const safeAvg = clamp(avg, min, max);
      const color = getGaugeColor(safeAvg, min, max);

      const bgArc = describeArc(100, 120, 70, 180, 360);
      const valueEndAngle = 180 + (((safeAvg - min) / (max - min)) * 180);
      const valueArc = describeArc(100, 120, 70, 180, valueEndAngle);

      const needle = getNeedlePoint(100, 120, 58, safeAvg, min, max);

      const card = document.createElement("div");
      card.className = "gauge-card";
      card.innerHTML = `
        <div class="gauge-title">${title}</div>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 200 170" aria-label="${title} average gauge">
            <path class="gauge-bg" d="${bgArc}"></path>
            <path class="gauge-value" d="${valueArc}" style="stroke:${color};"></path>

            <line class="gauge-needle" x1="100" y1="120" x2="${needle.x}" y2="${needle.y}"></line>
            <circle class="gauge-center" cx="100" cy="120" r="5"></circle>

            <text class="gauge-score" x="100" y="110">${safeAvg.toFixed(2)}</text>
            <text class="gauge-sub" x="100" y="128">based on ${count} answer(s)</text>

            <text class="gauge-scale" x="28" y="126">${min}</text>
            <text class="gauge-scale" x="172" y="126">${max}</text>
          </svg>
        </div>
      `;
      return card;
    }

    function renderGauges(filteredRows) {
      const gaugesEl = document.getElementById("gauges");
      const emptyEl = document.getElementById("gaugeEmpty");

      gaugesEl.innerHTML = "";

      const results = [];

      for (const gauge of gaugeDefinitions) {
        const columnIndex = findQuestionColumnIndex(gauge.matchers);
        if (columnIndex === -1) continue;

        const numericValues = filteredRows
          .map(row => parseNumericValue(row[columnIndex]))
          .filter(v => v !== null)
          .map(v => clamp(v, 1, 5));

        if (!numericValues.length) continue;

        const sum = numericValues.reduce((a, b) => a + b, 0);
        const avg = sum / numericValues.length;

        results.push({
          title: gauge.label,
          avg: clamp(avg, 1, 5),
          count: numericValues.length
        });
      }

      if (!results.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      for (const item of results) {
        gaugesEl.appendChild(buildGauge(item.title, item.avg, item.count));
      }
    }

    function applyFilters() {
      const filteredRows = getFilteredRows();
      renderTable(filteredRows);
      renderGauges(filteredRows);
    }

    async function loadSheet() {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();

      rows = parseCSV(text);
      headers = rows[0] || [];

      populateUnitFilter();
      applyFilters();
    }

    document.getElementById("unitFilter").addEventListener("change", applyFilters);

    loadSheet();
  </script>
</body>
</html>
