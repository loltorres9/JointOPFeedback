<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joint Operations Feedback Viewer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #475569;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #22c55e;
      --button: #2563eb;
      --button-hover: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1500px;
      margin: auto;
    }

    .card {
      background: var(--panel);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .muted {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    select,
    button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    select {
      background: #0b1220;
      color: var(--text);
      min-width: 220px;
    }

    button {
      background: var(--button);
      color: white;
      cursor: pointer;
      min-width: 120px;
      border: none;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat-box {
      background: var(--panel-2);
      border-radius: 10px;
      padding: 14px;
      border: 1px solid var(--border);
    }

    .stat-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: bold;
    }

    .gauge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .gauge-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 270px;
      display: flex;
      flex-direction: column;
    }

    .gauge-title {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.35;
      min-height: 40px;
      margin-bottom: 10px;
    }

    .gauge-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }

    .gauge-svg {
      width: 100%;
      max-width: 260px;
      height: 190px;
      display: block;
      overflow: visible;
    }

    .gauge-bg {
      fill: none;
      stroke: #16213a;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .gauge-value {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .gauge-needle {
      stroke: #ffffff;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gauge-center {
      fill: #ffffff;
    }

    .gauge-score {
      font-size: 24px;
      font-weight: bold;
      fill: #ffffff;
      text-anchor: middle;
    }

    .gauge-sub {
      font-size: 12px;
      fill: #cbd5e1;
      text-anchor: middle;
    }

    .gauge-scale {
      font-size: 12px;
      fill: var(--muted);
      text-anchor: middle;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: var(--panel-2);
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .empty {
      color: var(--muted);
      padding: 12px 0 0;
    }

    @media (max-width: 700px) {
      body {
        padding: 18px;
      }

      .gauge-card {
        min-height: 250px;
      }

      .gauge-svg {
        height: 180px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      select,
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>Joint Operations Feedback</h1>
      <p class="muted">Live results from the Google Form</p>

      <div class="toolbar">
        <select id="periodFilter">
          <option value="">All Periods</option>
        </select>

        <select id="unitFilter">
          <option value="">All Units</option>
        </select>

        <button id="refreshButton" type="button">Refresh</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-title">Total responses</div>
          <div class="stat-value" id="totalResponses">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-title">Visible responses</div>
          <div class="stat-value" id="visibleResponses">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-title">Selected period</div>
          <div class="stat-value" id="selectedPeriod" style="font-size:18px;">All Periods</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Average Scores</h2>
      <p class="muted">These gauges show the average score of the currently selected unit and period.</p>
      <div id="gauges" class="gauge-grid"></div>
      <div id="gaugeEmpty" class="empty" style="display:none;">
        No numeric data found for the selected responses.
      </div>
    </div>

    <div class="card">
      <h2>Responses</h2>
      <div class="table-wrap">
        <table id="table">
          <thead>
            <tr id="header"></tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQf8L3Zc_XWlfcoyTnJfFlaiGPjcNyUDXODP12qHF1yQk3_DZJVBCJbWXNRzsgw53TRCn1BCo_VBm4U/pub?output=csv";

    const unitColumnName = "Your Unit?";
    const timestampColumnName = "Timestamp";
    const gaugeMin = 1;
    const gaugeMax = 10;

    let rows = [];
    let headers = [];
    let enrichedRows = [];

    const gaugeDefinitions = [
      {
        label: "Mission Satisfaction",
        matchers: [
          "how satisfied were you with the mission",
          "satisfied were you with the mission"
        ]
      },
      {
        label: "Performance",
        matchers: [
          "how was your performance throughout the mission",
          "performance throughout the mission"
        ]
      },
      {
        label: "Mission Difficulty",
        matchers: [
          "how would you rate the mission's difficulty level",
          "how would you rate the missions difficulty level",
          "mission difficulty level"
        ]
      },
      {
        label: "C2 Satisfaction",
        matchers: [
          "how satisfied are you with c2 in the mission",
          "satisfied are you with c2 in the mission",
          "c2 in the mission"
        ]
      }
    ];

    function parseCSV(text) {
      const result = [];
      let row = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(current);
          result.push(row);
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current);
        result.push(row);
      }

      return result.filter(r => r.some(cell => String(cell).trim() !== ""));
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9? ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getUnitColumnIndex() {
      return headers.findIndex(h => normalizeText(h) === normalizeText(unitColumnName));
    }

    function getTimestampColumnIndex() {
      return headers.findIndex(h => normalizeText(h) === normalizeText(timestampColumnName));
    }

    function getVisibleColumnIndexes() {
      const timestampIndex = getTimestampColumnIndex();
      return headers
        .map((_, index) => index)
        .filter(index => index !== timestampIndex);
    }

    function findQuestionColumnIndex(matchers) {
      return headers.findIndex(header => {
        const normalizedHeader = normalizeText(header);
        return matchers.some(m => normalizedHeader.includes(normalizeText(m)));
      });
    }

    function parseNumericValue(value) {
      if (value === null || value === undefined) return null;

      const cleaned = String(value).trim().replace(",", ".");
      if (cleaned === "") return null;

      const num = Number(cleaned);
      if (Number.isNaN(num)) return null;

      return num;
    }

    function parseResponseDate(value) {
      if (!value) return null;

      const raw = String(value).trim();
      if (!raw) return null;

      const nativeParsed = new Date(raw);
      if (!Number.isNaN(nativeParsed.getTime())) {
        return nativeParsed;
      }

      const dotMatch = raw.match(
        /^(\d{1,2})\.(\d{1,2})\.(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/
      );
      if (dotMatch) {
        const [, dd, mm, yyyy, hh = "0", mi = "0", ss = "0"] = dotMatch;
        const year = yyyy.length === 2 ? Number(`20${yyyy}`) : Number(yyyy);
        return new Date(
          year,
          Number(mm) - 1,
          Number(dd),
          Number(hh),
          Number(mi),
          Number(ss)
        );
      }

      const slashMatch = raw.match(
        /^(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/
      );
      if (slashMatch) {
        let [, a, b, yyyy, hh = "0", mi = "0", ss = "0"] = slashMatch;
        const year = yyyy.length === 2 ? Number(`20${yyyy}`) : Number(yyyy);

        let day;
        let month;

        if (Number(a) > 12) {
          day = Number(a);
          month = Number(b) - 1;
        } else {
          month = Number(a) - 1;
          day = Number(b);
        }

        return new Date(year, month, day, Number(hh), Number(mi), Number(ss));
      }

      return null;
    }

    function lastSaturdayOfMonth(year, monthIndex) {
      const lastDay = new Date(year, monthIndex + 1, 0);
      const dayOfWeek = lastDay.getDay();
      const diffToSaturday = (dayOfWeek - 6 + 7) % 7;
      return new Date(year, monthIndex, lastDay.getDate() - diffToSaturday);
    }

    function addMonths(year, monthIndex, amount) {
      const d = new Date(year, monthIndex + amount, 1);
      return { year: d.getFullYear(), monthIndex: d.getMonth() };
    }

    function periodLabelForMonth(year, monthIndex) {
      return new Date(year, monthIndex, 1).toLocaleString("en-US", {
        month: "short",
        year: "numeric"
      });
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0, 0);
    }

    function endOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999);
    }

    function getPeriodForDate(date) {
      if (!date) return null;

      const candidates = [];
      const baseYear = date.getFullYear();
      const baseMonth = date.getMonth();

      for (let offset = -2; offset <= 1; offset++) {
        const current = addMonths(baseYear, baseMonth, offset);
        const next = addMonths(current.year, current.monthIndex, 1);

        const start = startOfDay(lastSaturdayOfMonth(current.year, current.monthIndex));
        const end = endOfDay(lastSaturdayOfMonth(next.year, next.monthIndex));

        candidates.push({
          key: `${current.year}-${String(current.monthIndex + 1).padStart(2, "0")}`,
          label: periodLabelForMonth(current.year, current.monthIndex),
          start,
          end
        });
      }

      candidates.sort((a, b) => a.start - b.start);

      for (const candidate of candidates) {
        if (date >= candidate.start && date <= candidate.end) {
          return candidate;
        }
      }

      const fallbackPrev = addMonths(baseYear, baseMonth, -1);
      return {
        key: `${fallbackPrev.year}-${String(fallbackPrev.monthIndex + 1).padStart(2, "0")}`,
        label: periodLabelForMonth(fallbackPrev.year, fallbackPrev.monthIndex),
        start: startOfDay(lastSaturdayOfMonth(fallbackPrev.year, fallbackPrev.monthIndex)),
        end: endOfDay(lastSaturdayOfMonth(baseYear, baseMonth))
      };
    }

    function buildEnrichedRows() {
      const timestampIndex = getTimestampColumnIndex();

      enrichedRows = rows.slice(1).map((row) => {
        const timestampValue = timestampIndex >= 0 ? row[timestampIndex] : "";
        const parsedDate = parseResponseDate(timestampValue);
        const period = getPeriodForDate(parsedDate);

        return {
          row,
          date: parsedDate,
          periodKey: period ? period.key : "",
          periodLabel: period ? period.label : "Unknown",
          periodStart: period ? period.start : null,
          periodEnd: period ? period.end : null
        };
      });
    }

    function populatePeriodFilter() {
      const select = document.getElementById("periodFilter");
      const currentValue = select.value;

      const uniquePeriods = [];
      const seen = new Set();

      enrichedRows
        .filter(item => item.periodKey)
        .sort((a, b) => {
          const aTime = a.periodStart ? a.periodStart.getTime() : 0;
          const bTime = b.periodStart ? b.periodStart.getTime() : 0;
          return bTime - aTime;
        })
        .forEach(item => {
          if (!seen.has(item.periodKey)) {
            seen.add(item.periodKey);
            uniquePeriods.push({
              key: item.periodKey,
              label: item.periodLabel
            });
          }
        });

      select.innerHTML = '<option value="">All Periods</option>';

      for (const period of uniquePeriods) {
        const option = document.createElement("option");
        option.value = period.key;
        option.textContent = period.label;
        select.appendChild(option);
      }

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function getPeriodFilteredRows() {
      const selectedPeriod = document.getElementById("periodFilter").value;

      return enrichedRows.filter(item => {
        return !selectedPeriod || item.periodKey === selectedPeriod;
      });
    }

    function populateUnitFilter() {
      const select = document.getElementById("unitFilter");
      const currentValue = select.value;
      const unitIndex = getUnitColumnIndex();
      const periodFiltered = getPeriodFilteredRows();

      select.innerHTML = '<option value="">All Units</option>';

      if (unitIndex === -1) return;

      const units = [...new Set(
        periodFiltered
          .map(item => (item.row[unitIndex] || "").trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      for (const unit of units) {
        const option = document.createElement("option");
        option.value = unit;
        option.textContent = unit;
        select.appendChild(option);
      }

      if ([...select.options].some(option => option.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function getFilteredRows() {
      const selectedPeriod = document.getElementById("periodFilter").value;
      const selectedUnit = document.getElementById("unitFilter").value;
      const unitIndex = getUnitColumnIndex();

      return enrichedRows.filter(item => {
        const matchesPeriod = !selectedPeriod || item.periodKey === selectedPeriod;
        const matchesUnit =
          !selectedUnit ||
          unitIndex === -1 ||
          ((item.row[unitIndex] || "").trim() === selectedUnit);

        return matchesPeriod && matchesUnit;
      });
    }

    function renderTable(filteredItems) {
      const header = document.getElementById("header");
      const body = document.getElementById("body");
      const visibleIndexes = getVisibleColumnIndexes();

      header.innerHTML = "";
      body.innerHTML = "";

      for (const index of visibleIndexes) {
        const th = document.createElement("th");
        th.textContent = headers[index];
        header.appendChild(th);
      }

      for (const item of filteredItems) {
        const tr = document.createElement("tr");

        for (const index of visibleIndexes) {
          const td = document.createElement("td");
          td.textContent = item.row[index] ?? "";
          tr.appendChild(td);
        }

        body.appendChild(tr);
      }

      document.getElementById("totalResponses").textContent = enrichedRows.length;
      document.getElementById("visibleResponses").textContent = filteredItems.length;

      const selectedPeriodValue = document.getElementById("periodFilter").value;
      const selectedPeriodText =
        selectedPeriodValue
          ? document.querySelector(`#periodFilter option[value="${selectedPeriodValue}"]`)?.textContent || "Unknown"
          : "All Periods";

      document.getElementById("selectedPeriod").textContent = selectedPeriodText;
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const angleRad = angleDeg * Math.PI / 180;
      return {
        x: cx + (r * Math.cos(angleRad)),
        y: cy + (r * Math.sin(angleRad))
      };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, startAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
    }

    function getGaugeColor(avg, min = gaugeMin, max = gaugeMax) {
      const normalized = (avg - min) / (max - min);
      if (normalized < 0.4) return getComputedStyle(document.documentElement).getPropertyValue('--danger').trim();
      if (normalized < 0.7) return getComputedStyle(document.documentElement).getPropertyValue('--warn').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--ok').trim();
    }

    function buildGauge(title, avg, count) {
      const min = gaugeMin;
      const max = gaugeMax;
      const safeAvg = clamp(avg, min, max);
      const color = getGaugeColor(safeAvg, min, max);

      const cx = 100;
      const cy = 115;
      const r = 55;

      const bgArc = describeArc(cx, cy, r, 180, 360);
      const valueEndAngle = 180 + (((safeAvg - min) / (max - min)) * 180);
      const valueArc = describeArc(cx, cy, r, 180, valueEndAngle);

      const needleLength = 40;
      const needle = polarToCartesian(cx, cy, needleLength, valueEndAngle);

      const leftScale = polarToCartesian(cx, cy, r + 16, 180);
      const rightScale = polarToCartesian(cx, cy, r + 16, 360);

      const card = document.createElement("div");
      card.className = "gauge-card";
      card.innerHTML = `
        <div class="gauge-title">${title}</div>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 200 190" aria-label="${title} average gauge">
            <path class="gauge-bg" d="${bgArc}"></path>
            <path class="gauge-value" d="${valueArc}" style="stroke:${color};"></path>

            <line class="gauge-needle" x1="${cx}" y1="${cy}" x2="${needle.x}" y2="${needle.y}"></line>
            <circle class="gauge-center" cx="${cx}" cy="${cy}" r="4.5"></circle>

            <text class="gauge-score" x="${cx}" y="160">${safeAvg.toFixed(2)}</text>
            <text class="gauge-sub" x="${cx}" y="178">based on ${count} answer(s)</text>

            <text class="gauge-scale" x="${leftScale.x}" y="${leftScale.y + 5}">${min}</text>
            <text class="gauge-scale" x="${rightScale.x}" y="${rightScale.y + 5}">${max}</text>
          </svg>
        </div>
      `;
      return card;
    }

    function renderGauges(filteredItems) {
      const gaugesEl = document.getElementById("gauges");
      const emptyEl = document.getElementById("gaugeEmpty");

      gaugesEl.innerHTML = "";

      const results = [];

      for (const gauge of gaugeDefinitions) {
        const columnIndex = findQuestionColumnIndex(gauge.matchers);
        if (columnIndex === -1) continue;

        const numericValues = filteredItems
          .map(item => parseNumericValue(item.row[columnIndex]))
          .filter(v => v !== null)
          .map(v => clamp(v, gaugeMin, gaugeMax));

        if (!numericValues.length) continue;

        const sum = numericValues.reduce((a, b) => a + b, 0);
        const avg = sum / numericValues.length;

        results.push({
          title: gauge.label,
          avg: clamp(avg, gaugeMin, gaugeMax),
          count: numericValues.length
        });
      }

      if (!results.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      for (const item of results) {
        gaugesEl.appendChild(buildGauge(item.title, item.avg, item.count));
      }
    }

    function applyFilters() {
      const filteredItems = getFilteredRows();
      renderTable(filteredItems);
      renderGauges(filteredItems);
    }

    function handlePeriodChange() {
      populateUnitFilter();
      applyFilters();
    }

    async function loadSheet() {
      const refreshButton = document.getElementById("refreshButton");
      refreshButton.disabled = true;
      refreshButton.textContent = "Refreshing...";

      try {
        const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
        const text = await res.text();

        rows = parseCSV(text);
        headers = rows[0] || [];

        buildEnrichedRows();
        populatePeriodFilter();
        populateUnitFilter();
        applyFilters();
      } catch (error) {
        console.error("Failed to load sheet data:", error);
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = "Refresh";
      }
    }

    document.getElementById("periodFilter").addEventListener("change", handlePeriodChange);
    document.getElementById("unitFilter").addEventListener("change", applyFilters);
    document.getElementById("refreshButton").addEventListener("click", loadSheet);

    loadSheet();
  </script>
</body>
</html>
